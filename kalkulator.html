<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kalkulator Rahasia</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:Arial;
    }

    .calculator{
      width:350px;
      background:#1e293b;
      padding:20px;
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .display{
      width:100%;
      height:90px;
      background:#0f172a;
      border-radius:20px;
      color:white;
      font-size:38px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      padding:15px;
      box-sizing:border-box;
      margin-bottom:20px;
      overflow:hidden;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:70px;
      border:none;
      border-radius:20px;
      font-size:28px;
      color:white;
      cursor:pointer;
      transition:.15s;
    }

    button:active{
      transform:scale(.95);
    }

    .number{
      background:#255;
    }

    .operator{
      background:#2563eb;
    }

    .equal{
      background:#16a34a;
    }

    .clear{
      background:#dc2626;
    }

    .delete{
      background:#d97706;
    }

  </style>
</head>

<body>

  <div class="calculator">

    <!-- Display -->
    <div class="display" id="display">
      0
    </div>

    <!-- Buttons -->
    <div class="buttons">

      <button onclick="clearDisplay()" class="clear">
        C
      </button>

      <button onclick="deleteLast()" class="delete">
        ⌫
      </button>

      <button onclick="appendValue('%')" class="operator">
        %
      </button>

      <button onclick="appendValue('/')" class="operator">
        ÷
      </button>

      <button onclick="appendValue('7')" class="number">
        7
      </button>

      <button onclick="appendValue('8')" class="number">
        8
      </button>

      <button onclick="appendValue('9')" class="number">
        9
      </button>

      <button onclick="appendValue('*')" class="operator">
        ×
      </button>

      <button onclick="appendValue('4')" class="number">
        4
      </button>

      <button onclick="appendValue('5')" class="number">
        5
      </button>

      <button onclick="appendValue('6')" class="number">
        6
      </button>

      <button onclick="appendValue('-')" class="operator">
        −
      </button>

      <button onclick="appendValue('1')" class="number">
        1
      </button>

      <button onclick="appendValue('2')" class="number">
        2
      </button>

      <button onclick="appendValue('3')" class="number">
        3
      </button>

      <button onclick="appendValue('+')" class="operator">
        +
      </button>

      <button
      onclick="appendValue('0')"
      class="number"
      style="grid-column:span 2;">
        0
      </button>

      <button onclick="appendValue('.')" class="number">
        .
      </button>

      <button onclick="calculate()" class="equal">
        =
      </button>

    </div>

  </div>

  <script>

    const display =
    document.getElementById("display");

    // Tambah angka/operator
    function appendValue(value){

      if(display.innerText === "0" ||
         display.innerText === "Error"){

        display.innerText = value;

      } else {

        display.innerText += value;

      }

    }

    // Hapus semua
    function clearDisplay(){

      display.innerText = "0";

    }

    // Hapus 1 karakter
    function deleteLast(){

      let text = display.innerText;

      if(text.length <= 1){

        display.innerText = "0";

      } else {

        display.innerText =
        text.slice(0,-1);

      }

    }

    // Kalkulator Rahasia
    function calculate(){

      try{

        let expression =
        display.innerText;

        /* =========================
           HASIL RAHASIA
        ========================== */

        if(expression === "1+1"){

          display.innerText =
          "mas bahlil ganteng";

        }

        else if(expression === "10*10"){

          display.innerText =
          "cari sendiri lah kocak";

        }

        else if(expression === "2*2"){

          display.innerText =
          "made by reza";

        }

        else if(expression === "2+2"){

          display.innerText =
          "pocu love puji";

        }
        else if(expression === "2+3"){

          display.innerText =
          "pocu";

        }
        /* =========================
           HASIL NORMAL
        ========================== */

        else{

          display.innerText =
          eval(expression);

        }

      }

      catch{

        display.innerText = "Error";

      }

    }
    
  </script>

</body>
</html>
